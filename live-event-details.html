<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Results | Lumina Vote</title>

<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  margin:0;
  background:#faf7f0;
  color:#161311;
  font-family:Arial, Helvetica, sans-serif;
}

a{color:inherit}

/* HEADER */
.siteHeader{
  position:sticky;
  top:0;
  z-index:100;
  background:#ffffff;
  border-bottom:1px solid #eee4d3;
}

.siteHeaderInner{
  max-width:1180px;
  margin:0 auto;
  height:68px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:0 18px;
}

.logoLink{
  display:flex;
  align-items:center;
  gap:9px;
  text-decoration:none;
  color:#161311;
  font-weight:900;
  font-size:19px;
  letter-spacing:-0.4px;
}

.logoMark{
  width:30px;
  height:30px;
  border-radius:8px;
  background:linear-gradient(135deg,#d4af37,#b88718);
  display:grid;
  place-items:center;
  color:#fff;
  font-weight:900;
  font-size:16px;
  font-style:italic;
}

.navLinks{
  display:none;
  align-items:center;
  gap:26px;
  font-size:14px;
  font-weight:600;
  color:#6b6156;
}

.navLinks a{text-decoration:none}
.navLinks a.active{color:#161311}

.headerRight{
  display:flex;
  align-items:center;
  gap:10px;
}

.searchBox{
  display:none;
  align-items:center;
  gap:8px;
  background:#f4efe4;
  border-radius:999px;
  padding:9px 14px;
  font-size:13px;
  color:#8a7f6f;
  min-width:200px;
}

.searchBox input{
  border:0;
  background:transparent;
  outline:none;
  font-size:13px;
  width:100%;
  color:#161311;
}

.getStartedBtn{
  border:0;
  background:#161311;
  color:#fff;
  padding:11px 18px;
  border-radius:999px;
  font-weight:800;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}

@media(min-width:860px){
  .navLinks{display:flex}
  .searchBox{display:flex}
}

/* MAIN */
.pageWrap{
  max-width:1180px;
  margin:0 auto;
  padding:26px 18px 70px;
}

.breadcrumb{
  font-size:13px;
  color:#a99a80;
  margin-bottom:16px;
}

.breadcrumb a{text-decoration:none;color:#a99a80}
.breadcrumb span.current{color:#161311;font-weight:700}

.eyebrow{
  display:inline-block;
  background:#f6e6c8;
  color:#8a5b12;
  font-weight:800;
  font-size:11px;
  letter-spacing:.05em;
  text-transform:uppercase;
  padding:7px 12px;
  border-radius:999px;
  margin-bottom:14px;
}

.pageTitle{
  margin:0 0 8px;
  font-size:32px;
  font-weight:900;
  letter-spacing:-0.5px;
}

.pageSub{
  margin:0 0 26px;
  color:#6b6156;
  font-size:14.5px;
  line-height:1.55;
  max-width:640px;
}

/* DASHBOARD CARD */
.dashCard{
  background:#ffffff;
  border:1px solid #efe7d8;
  border-radius:18px;
  padding:22px;
  box-shadow:0 10px 30px rgba(60,45,10,0.05);
  margin-bottom:22px;
  display:flex;
  flex-wrap:wrap;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
}

.dashLeft .dashEyebrow{
  font-size:11px;
  font-weight:800;
  color:#a99a80;
  text-transform:uppercase;
  letter-spacing:.05em;
  margin-bottom:6px;
}

.dashLeft h2{
  margin:0;
  font-size:24px;
  font-weight:900;
}

.dashRight{
  display:flex;
  align-items:center;
  gap:28px;
  flex-wrap:wrap;
}

.statBlock{
  text-align:right;
}

.statBlock b{
  display:block;
  font-size:22px;
  font-weight:900;
}

.statBlock span{
  display:block;
  font-size:11px;
  color:#8a7f6f;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.04em;
}

.refreshBtn{
  border:0;
  background:#161311;
  color:#fff;
  padding:12px 18px;
  border-radius:999px;
  font-weight:800;
  font-size:13px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  white-space:nowrap;
}

.refreshBtn .spin{
  display:inline-block;
}

.refreshBtn.loading .spin{
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* RESULTS LIST */
.resultsList{
  display:flex;
  flex-direction:column;
  gap:22px;
}

.resultRow{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.resultTop{
  display:flex;
  align-items:flex-start;
  gap:12px;
}

.rankBadge{
  flex:0 0 auto;
  width:26px;
  height:26px;
  border-radius:7px;
  display:grid;
  place-items:center;
  font-size:12px;
  font-weight:900;
  color:#161311;
}

.resultName{
  flex:1;
  min-width:0;
}

.resultNameTop{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.resultName b{
  font-size:14.5px;
  font-weight:800;
  font-style:italic;
}

.categoryTag{
  display:inline-block;
  background:#f2ead9;
  color:#8a5b12;
  font-size:10px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.03em;
  padding:3px 8px;
  border-radius:999px;
}

.resultName span.numTag{
  display:block;
  font-size:11.5px;
  color:#a99a80;
  font-weight:700;
  margin-top:2px;
}

.resultStats{
  flex:0 0 auto;
  text-align:right;
}

.resultStats b{
  display:block;
  font-size:15px;
  font-weight:900;
}

.resultStats span{
  display:block;
  font-size:11px;
  color:#a99a80;
  font-weight:700;
  margin-top:2px;
}

.voteMiniBtn{
  flex:0 0 auto;
  border:0;
  background:linear-gradient(135deg,#d4af37,#b88718);
  color:#1b1008;
  padding:10px 16px;
  border-radius:999px;
  font-weight:800;
  font-size:12px;
  cursor:pointer;
  white-space:nowrap;
}

.barTrack{
  height:9px;
  background:#f2ead9;
  border-radius:999px;
  overflow:hidden;
}

.barFill{
  height:100%;
  border-radius:999px;
  transition:width .4s ease;
}

/* STATE BOXES */
.stateBox{
  border:1px dashed #e6dabd;
  border-radius:16px;
  padding:34px 20px;
  text-align:center;
  color:#a99a80;
  font-size:14px;
  font-weight:600;
}

.hidden{display:none !important}

/* MAINTENANCE COUNTDOWN BANNER */
.maintenanceBanner{
  background:#161311;
  color:#faf7f0;
  text-align:center;
  padding:10px 16px;
  font-size:13px;
  font-weight:700;
  letter-spacing:.01em;
}

.maintenanceBanner b{
  color:#e8c874;
  font-variant-numeric:tabular-nums;
  font-weight:900;
}
</style>
</head>

<body>

<div class="maintenanceBanner" id="maintenanceBanner">⚠ Scheduled maintenance in <b id="maintenanceCountdown">--:--:--</b></div>

<header class="siteHeader">
  <div class="siteHeaderInner">
    <a class="logoLink" href="index.html">
      <span class="logoMark">V</span>
      <span>Lumina Vote</span>
    </a>

    <nav class="navLinks">
      <a href="index.html">Home</a>
      <a href="live-results.html" class="active">Live Results</a>
      <a href="verify-vote.html">Verify vote</a>
      <a href="support.html">Support</a>
    </nav>

    <div class="headerRight">
      <label class="searchBox">
        <span>⌕</span>
        <input type="search" placeholder="Search events...">
      </label>
      <button class="getStartedBtn" type="button" onclick="window.location.href='index.html'">Get Started</button>
    </div>
  </div>
</header>

<main class="pageWrap">

  <div class="breadcrumb">
    <a href="index.html">Home</a> / <span class="current">Live Results</span>
  </div>

  <span class="eyebrow">Results Dashboard</span>
  <h1 class="pageTitle">Live Results</h1>
  <p class="pageSub">Current standings for every nominee across all categories.</p>

  <div class="dashCard">
    <div class="dashLeft">
      <div class="dashEyebrow" id="dashEventName">SMA Model Scout Awards</div>
      <h2>Live Standings</h2>
    </div>

    <div class="dashRight">
      <div class="statBlock">
        <b id="dashNomineeCount">0</b>
        <span>Nominees</span>
      </div>

      <div class="statBlock">
        <b id="dashTotalVotes">0</b>
        <span>Total Votes</span>
      </div>

      <button class="refreshBtn" id="refreshBtn" type="button">
        <span class="spin">↻</span>
        <span>Refresh results</span>
      </button>
    </div>
  </div>

  <div id="emptyState" class="stateBox hidden">No nominees found.</div>

  <div class="resultsList" id="resultsList"></div>

</main>

<script>
(function(){
  var MAINTENANCE_AT = new Date("2026-07-22T13:20:00Z").getTime();
  var countdownEl = document.getElementById("maintenanceCountdown");
  var bannerEl = document.getElementById("maintenanceBanner");

  function pad(n){ return String(n).padStart(2, "0"); }

  function showMaintenanceOverlay(){
    bannerEl.classList.add("hidden");

    var overlay = document.createElement("div");
    overlay.id = "maintenance-overlay";
    overlay.style.cssText = "position:fixed;inset:0;width:100vw;height:100vh;z-index:2147483647;background:rgba(22,19,17,0.94);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;";
    overlay.innerHTML =
      '<div style="max-width:440px;color:#faf7f0;font-family:Arial, Helvetica, sans-serif;">' +
        '<div style="font-size:52px;margin-bottom:18px;">🛠️</div>' +
        '<h1 style="font-size:26px;margin:0 0 12px;font-weight:900;">We\'ll be right back</h1>' +
        '<p style="font-size:16px;line-height:1.6;opacity:0.85;margin:0;">' +
          'This site is currently down for scheduled maintenance. We\'re working hard to get things back up and running. Please check back shortly.' +
        '</p>' +
      '</div>';
    document.body.appendChild(overlay);

    document.documentElement.style.overflow = "hidden";
    document.body.style.overflow = "hidden";
    document.addEventListener("contextmenu", function(e){ e.preventDefault(); }, true);
    document.addEventListener("keydown", function(e){ e.stopPropagation(); e.preventDefault(); }, true);
    document.addEventListener("wheel", function(e){ e.preventDefault(); }, { passive: false, capture: true });
    document.addEventListener("touchmove", function(e){ e.preventDefault(); }, { passive: false, capture: true });
  }

  function tick(){
    var remaining = MAINTENANCE_AT - Date.now();

    if(remaining <= 0){
      countdownEl.textContent = "00:00:00";
      clearInterval(timer);
      showMaintenanceOverlay();
      return;
    }

    var totalSeconds = Math.floor(remaining / 1000);
    var hours = Math.floor(totalSeconds / 3600);
    var minutes = Math.floor((totalSeconds % 3600) / 60);
    var seconds = totalSeconds % 60;

    countdownEl.textContent = pad(hours) + ":" + pad(minutes) + ":" + pad(seconds);
  }

  tick();
  var timer = setInterval(tick, 1000);
})();

const RANK_COLORS = ["#d64541", "#e8935a", "#f0cf5f", "#161311", "#d64541", "#e8935a", "#f0cf5f", "#161311"];

const dashNomineeCount = document.getElementById("dashNomineeCount");
const dashTotalVotes = document.getElementById("dashTotalVotes");
const refreshBtn = document.getElementById("refreshBtn");
const emptyState = document.getElementById("emptyState");
const resultsList = document.getElementById("resultsList");

function money0(n){
  return Number(n || 0).toLocaleString();
}

function renderResults(){
  const totalVotes = RESULTS.reduce((sum, row) => sum + row.votes, 0);
  dashNomineeCount.textContent = money0(RESULTS.length);
  dashTotalVotes.textContent = money0(totalVotes);

  resultsList.innerHTML = "";

  if(RESULTS.length === 0){
    emptyState.classList.remove("hidden");
    return;
  }

  emptyState.classList.add("hidden");

  RESULTS.forEach((row, index) => {
    const { name, category, votes, pct } = row;
    const color = RANK_COLORS[index % RANK_COLORS.length];
    const textColor = color === "#161311" ? "#fff" : "#161311";

    const rowEl = document.createElement("div");
    rowEl.className = "resultRow";
    rowEl.innerHTML = `
      <div class="resultTop">
        <div class="rankBadge" style="background:${color};color:${textColor}">${index + 1}</div>
        <div class="resultName">
          <div class="resultNameTop">
            <b>${name}</b>
            <span class="categoryTag">${category}</span>
          </div>
        </div>
        <div class="resultStats">
          <b>${pct.toFixed(1)}%</b>
          <span>${money0(votes)} votes</span>
        </div>
        <button class="voteMiniBtn" type="button">Vote</button>
      </div>
      <div class="barTrack">
        <div class="barFill" style="width:${pct}%;background:${color}"></div>
      </div>
    `;

    rowEl.querySelector(".voteMiniBtn").addEventListener("click", () => {
      alert("Voting is currently closed for this event.");
    });

    resultsList.appendChild(rowEl);
  });
}

refreshBtn.addEventListener("click", renderResults);

renderResults();
</script>

</body>
</html>
