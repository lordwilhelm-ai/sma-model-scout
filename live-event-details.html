<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Results | Lumina Vote</title>

<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  margin:0;
  background:#faf7f0;
  color:#161311;
  font-family:Arial, Helvetica, sans-serif;
}

a{color:inherit}

/* HEADER */
.siteHeader{
  position:sticky;
  top:0;
  z-index:100;
  background:#ffffff;
  border-bottom:1px solid #eee4d3;
}

.siteHeaderInner{
  max-width:1180px;
  margin:0 auto;
  height:68px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:0 18px;
}

.logoLink{
  display:flex;
  align-items:center;
  gap:9px;
  text-decoration:none;
  color:#161311;
  font-weight:900;
  font-size:19px;
  letter-spacing:-0.4px;
}

.logoMark{
  width:30px;
  height:30px;
  border-radius:8px;
  background:linear-gradient(135deg,#d4af37,#b88718);
  display:grid;
  place-items:center;
  color:#fff;
  font-weight:900;
  font-size:16px;
  font-style:italic;
}

.navLinks{
  display:none;
  align-items:center;
  gap:26px;
  font-size:14px;
  font-weight:600;
  color:#6b6156;
}

.navLinks a{text-decoration:none}
.navLinks a.active{color:#161311}

.headerRight{
  display:flex;
  align-items:center;
  gap:10px;
}

.searchBox{
  display:none;
  align-items:center;
  gap:8px;
  background:#f4efe4;
  border-radius:999px;
  padding:9px 14px;
  font-size:13px;
  color:#8a7f6f;
  min-width:200px;
}

.searchBox input{
  border:0;
  background:transparent;
  outline:none;
  font-size:13px;
  width:100%;
  color:#161311;
}

.getStartedBtn{
  border:0;
  background:#161311;
  color:#fff;
  padding:11px 18px;
  border-radius:999px;
  font-weight:800;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}

@media(min-width:860px){
  .navLinks{display:flex}
  .searchBox{display:flex}
}

/* MAIN */
.pageWrap{
  max-width:1180px;
  margin:0 auto;
  padding:26px 18px 70px;
}

.breadcrumb{
  font-size:13px;
  color:#a99a80;
  margin-bottom:16px;
}

.breadcrumb a{text-decoration:none;color:#a99a80}
.breadcrumb span.current{color:#161311;font-weight:700}

.eyebrow{
  display:inline-block;
  background:#f6e6c8;
  color:#8a5b12;
  font-weight:800;
  font-size:11px;
  letter-spacing:.05em;
  text-transform:uppercase;
  padding:7px 12px;
  border-radius:999px;
  margin-bottom:14px;
}

.pageTitle{
  margin:0 0 8px;
  font-size:32px;
  font-weight:900;
  letter-spacing:-0.5px;
}

.pageSub{
  margin:0 0 26px;
  color:#6b6156;
  font-size:14.5px;
  line-height:1.55;
  max-width:640px;
}

.selectorRow{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
  margin-bottom:22px;
}

@media(min-width:640px){
  .selectorRow{grid-template-columns:1fr 1fr}
}

.selectorField label{
  display:block;
  font-size:12px;
  font-weight:800;
  color:#6b6156;
  margin-bottom:7px;
  text-transform:uppercase;
  letter-spacing:.04em;
}

.selectorField select{
  width:100%;
  appearance:none;
  border:1px solid #ece2cd;
  background:#f6f0e2;
  border-radius:12px;
  padding:14px 16px;
  font-size:14px;
  font-weight:700;
  color:#161311;
  cursor:pointer;
}

/* DASHBOARD CARD */
.dashCard{
  background:#ffffff;
  border:1px solid #efe7d8;
  border-radius:18px;
  padding:22px;
  box-shadow:0 10px 30px rgba(60,45,10,0.05);
  margin-bottom:18px;
  display:flex;
  flex-wrap:wrap;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
}

.dashLeft .dashEyebrow{
  font-size:11px;
  font-weight:800;
  color:#a99a80;
  text-transform:uppercase;
  letter-spacing:.05em;
  margin-bottom:6px;
}

.dashLeft h2{
  margin:0;
  font-size:24px;
  font-weight:900;
}

.dashRight{
  display:flex;
  align-items:center;
  gap:28px;
  flex-wrap:wrap;
}

.statBlock{
  text-align:right;
}

.statBlock b{
  display:block;
  font-size:22px;
  font-weight:900;
}

.statBlock span{
  display:block;
  font-size:11px;
  color:#8a7f6f;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.04em;
}

.refreshBtn{
  border:0;
  background:#161311;
  color:#fff;
  padding:12px 18px;
  border-radius:999px;
  font-weight:800;
  font-size:13px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  white-space:nowrap;
}

.refreshBtn .spin{
  display:inline-block;
}

.refreshBtn.loading .spin{
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* TABS */
.viewTabs{
  display:inline-flex;
  background:#f2ead9;
  border-radius:999px;
  padding:4px;
  margin-bottom:22px;
}

.viewTabBtn{
  border:0;
  background:transparent;
  padding:10px 20px;
  border-radius:999px;
  font-weight:800;
  font-size:13px;
  color:#6b6156;
  cursor:pointer;
}

.viewTabBtn.active{
  background:#161311;
  color:#fff;
}

/* RESULTS LIST */
.resultsList{
  display:flex;
  flex-direction:column;
  gap:22px;
}

.resultRow{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.resultTop{
  display:flex;
  align-items:flex-start;
  gap:12px;
}

.rankBadge{
  flex:0 0 auto;
  width:26px;
  height:26px;
  border-radius:7px;
  display:grid;
  place-items:center;
  font-size:12px;
  font-weight:900;
  color:#161311;
}

.resultName{
  flex:1;
  min-width:0;
}

.resultName b{
  display:block;
  font-size:14.5px;
  font-weight:800;
  font-style:italic;
}

.resultName span{
  display:block;
  font-size:11.5px;
  color:#a99a80;
  font-weight:700;
  margin-top:2px;
}

.resultStats{
  flex:0 0 auto;
  text-align:right;
}

.resultStats b{
  display:block;
  font-size:15px;
  font-weight:900;
}

.resultStats span{
  display:block;
  font-size:11px;
  color:#a99a80;
  font-weight:700;
  margin-top:2px;
}

.barTrack{
  height:9px;
  background:#f2ead9;
  border-radius:999px;
  overflow:hidden;
}

.barFill{
  height:100%;
  border-radius:999px;
  transition:width .4s ease;
}

/* RANKINGS TABLE VIEW */
.rankTable{
  width:100%;
  border-collapse:collapse;
}

.rankTable th{
  text-align:left;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:#a99a80;
  font-weight:800;
  padding:0 10px 12px;
  border-bottom:1px solid #efe7d8;
}

.rankTable th.num,.rankTable td.num{text-align:right}

.rankTable td{
  padding:14px 10px;
  border-bottom:1px solid #f4eee0;
  font-size:14px;
}

.rankTable td.rankCell{
  font-weight:900;
  width:34px;
}

.rankTable td.nameCell b{
  display:block;
  font-weight:800;
  font-style:italic;
}

.rankTable td.nameCell span{
  display:block;
  font-size:11.5px;
  color:#a99a80;
  font-weight:700;
  margin-top:2px;
}

.rankTable td.num{
  font-weight:900;
  white-space:nowrap;
}

.viewPane{display:none}
.viewPane.active{display:block}

/* STATE BOXES */
.stateBox{
  border:1px dashed #e6dabd;
  border-radius:16px;
  padding:34px 20px;
  text-align:center;
  color:#a99a80;
  font-size:14px;
  font-weight:600;
}

.hidden{display:none !important}
</style>
</head>

<body>

<header class="siteHeader">
  <div class="siteHeaderInner">
    <a class="logoLink" href="index.html">
      <span class="logoMark">V</span>
      <span>Lumina Vote</span>
    </a>

    <nav class="navLinks">
      <a href="index.html">Home</a>
      <a href="live-results.html" class="active">Live Results</a>
      <a href="verify-vote.html">Verify vote</a>
      <a href="support.html">Support</a>
    </nav>

    <div class="headerRight">
      <label class="searchBox">
        <span>⌕</span>
        <input id="eventSearchInput" type="search" placeholder="Search events...">
      </label>
      <button class="getStartedBtn" type="button" onclick="window.location.href='index.html'">Get Started</button>
    </div>
  </div>
</header>

<main class="pageWrap">

  <div class="breadcrumb">
    <a href="index.html">Home</a> / <span class="current">Live Results</span>
  </div>

  <span class="eyebrow">Results Dashboard</span>
  <h1 class="pageTitle">Live Results</h1>
  <p class="pageSub">Select an event and category to view nominee standings. Use refresh to load the latest results.</p>

  <div class="selectorRow">
    <div class="selectorField">
      <label for="eventSelect">Event</label>
      <select id="eventSelect"></select>
    </div>

    <div class="selectorField">
      <label for="categorySelect">Category</label>
      <select id="categorySelect"></select>
    </div>
  </div>

  <div class="dashCard">
    <div class="dashLeft">
      <div class="dashEyebrow" id="dashEventName">—</div>
      <h2 id="dashCategoryName">—</h2>
    </div>

    <div class="dashRight">
      <div class="statBlock">
        <b id="dashNomineeCount">0</b>
        <span>Nominees</span>
      </div>

      <button class="refreshBtn" id="refreshBtn" type="button">
        <span class="spin">↻</span>
        <span>Refresh results</span>
      </button>
    </div>
  </div>

  <div class="viewTabs">
    <button class="viewTabBtn active" id="barTabBtn" type="button">Bar Chart</button>
    <button class="viewTabBtn" id="rankTabBtn" type="button">Rankings</button>
  </div>

  <div id="loadingState" class="stateBox">Loading results...</div>
  <div id="emptyState" class="stateBox hidden">No nominees found for this category.</div>

  <div id="barPane" class="viewPane active">
    <div class="resultsList" id="resultsList"></div>
  </div>

  <div id="rankPane" class="viewPane">
    <table class="rankTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Nominee</th>
          <th class="num">Votes</th>
          <th class="num">Share</th>
        </tr>
      </thead>
      <tbody id="rankTableBody"></tbody>
    </table>
  </div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxry90zexnjiHIjVv_QluPlPWcqfxWb6Q",
  authDomain: "sma-model-scout.firebaseapp.com",
  projectId: "sma-model-scout",
  storageBucket: "sma-model-scout.firebasestorage.app",
  messagingSenderId: "786081868543",
  appId: "1:786081868543:web:5805a21ac5dab4c799faca",
  measurementId: "G-10LWV01GZE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const RANK_COLORS = ["#d64541", "#e8935a", "#f0cf5f", "#161311", "#d64541", "#e8935a", "#f0cf5f", "#161311"];

const eventSelect = document.getElementById("eventSelect");
const categorySelect = document.getElementById("categorySelect");
const eventSearchInput = document.getElementById("eventSearchInput");

const dashEventName = document.getElementById("dashEventName");
const dashCategoryName = document.getElementById("dashCategoryName");
const dashNomineeCount = document.getElementById("dashNomineeCount");

const refreshBtn = document.getElementById("refreshBtn");

const barTabBtn = document.getElementById("barTabBtn");
const rankTabBtn = document.getElementById("rankTabBtn");
const barPane = document.getElementById("barPane");
const rankPane = document.getElementById("rankPane");

const loadingState = document.getElementById("loadingState");
const emptyState = document.getElementById("emptyState");
const resultsList = document.getElementById("resultsList");
const rankTableBody = document.getElementById("rankTableBody");

let allEvents = [];
let eventCategories = [];
let categoryContestants = [];
let activeView = "bar";

const params = new URLSearchParams(window.location.search);
const preselectEventId = params.get("event") || params.get("eventId");

function hasVoting(ev){
  return !!ev?.votingEnabled || ev?.type === "voting" || ev?.type === "voting_tickets" || !ev?.type;
}

function money0(n){
  return Number(n || 0).toLocaleString();
}

barTabBtn.addEventListener("click", () => setView("bar"));
rankTabBtn.addEventListener("click", () => setView("rank"));

function setView(view){
  activeView = view;
  barTabBtn.classList.toggle("active", view === "bar");
  rankTabBtn.classList.toggle("active", view === "rank");
  barPane.classList.toggle("active", view === "bar");
  rankPane.classList.toggle("active", view === "rank");
}

eventSelect.addEventListener("change", async () => {
  await loadCategoriesForSelectedEvent();
  await loadResults();
});

categorySelect.addEventListener("change", loadResults);

refreshBtn.addEventListener("click", loadResults);

eventSearchInput.addEventListener("input", () => {
  const term = eventSearchInput.value.trim().toLowerCase();

  [...eventSelect.options].forEach(opt => {
    opt.hidden = term && !opt.textContent.toLowerCase().includes(term);
  });
});

async function loadEvents(){
  const snap = await getDocs(collection(db, "events"));

  allEvents = snap.docs
    .map(docu => ({ id: docu.id, ...docu.data() }))
    .filter(hasVoting);

  eventSelect.innerHTML = "";

  if(allEvents.length === 0){
    eventSelect.innerHTML = `<option value="">No events available</option>`;
    return;
  }

  allEvents.forEach(ev => {
    const opt = document.createElement("option");
    opt.value = ev.id;
    opt.textContent = ev.eventName || "Untitled Event";
    eventSelect.appendChild(opt);
  });

  if(preselectEventId && allEvents.some(ev => ev.id === preselectEventId)){
    eventSelect.value = preselectEventId;
  }
}

async function loadCategoriesForSelectedEvent(){
  const eventId = eventSelect.value;
  eventCategories = [];
  categorySelect.innerHTML = "";

  if(!eventId) return;

  const q = query(collection(db, "eventCategories"), where("eventId", "==", eventId));
  const snap = await getDocs(q);

  eventCategories = snap.docs
    .map(docu => ({ id: docu.id, ...docu.data() }))
    .sort((a, b) => Number(a.categoryCode || 0) - Number(b.categoryCode || 0));

  if(eventCategories.length === 0){
    categorySelect.innerHTML = `<option value="">No categories</option>`;
    return;
  }

  eventCategories.forEach(cat => {
    const opt = document.createElement("option");
    opt.value = cat.id;
    opt.textContent = cat.categoryName || `Category ${cat.categoryCode || ""}`;
    categorySelect.appendChild(opt);
  });
}

function contestantMatchesCategory(item, cat){
  if(!cat) return false;
  if(item.categoryId && item.categoryId === cat.id) return true;
  if(item.categoryCode && String(item.categoryCode) === String(cat.categoryCode)) return true;
  if(item.categoryName && String(item.categoryName).toLowerCase() === String(cat.categoryName || "").toLowerCase()) return true;
  return false;
}

async function loadResults(){
  const eventId = eventSelect.value;
  const categoryId = categorySelect.value;
  const ev = allEvents.find(e => e.id === eventId);
  const cat = eventCategories.find(c => c.id === categoryId);

  dashEventName.textContent = ev?.eventName || "—";
  dashCategoryName.textContent = cat?.categoryName || "—";

  if(!eventId || !categoryId){
    categoryContestants = [];
    renderResults();
    return;
  }

  refreshBtn.classList.add("loading");
  loadingState.classList.remove("hidden");
  emptyState.classList.add("hidden");
  resultsList.innerHTML = "";
  rankTableBody.innerHTML = "";

  try{
    const q = query(collection(db, "eventContestants"), where("eventId", "==", eventId));
    const snap = await getDocs(q);

    const all = snap.docs.map(docu => ({ id: docu.id, ...docu.data() }));

    categoryContestants = all
      .filter(item => contestantMatchesCategory(item, cat))
      .sort((a, b) => Number(b.votes || 0) - Number(a.votes || 0));

    renderResults();

  }catch(error){
    console.error(error);
    loadingState.textContent = "Could not load results.";
    loadingState.classList.remove("hidden");
  }finally{
    refreshBtn.classList.remove("loading");
  }
}

function getCategoryVoteTotal(){
  return categoryContestants.reduce((sum, item) => sum + Number(item.votes || 0), 0);
}

function renderResults(){
  loadingState.classList.add("hidden");

  dashNomineeCount.textContent = money0(categoryContestants.length);

  resultsList.innerHTML = "";
  rankTableBody.innerHTML = "";

  if(categoryContestants.length === 0){
    emptyState.classList.remove("hidden");
    return;
  }

  emptyState.classList.add("hidden");

  const total = getCategoryVoteTotal();

  categoryContestants.forEach((item, index) => {
    const votes = Number(item.votes || 0);
    const pct = total > 0 ? (votes / total) * 100 : 0;
    const color = RANK_COLORS[index % RANK_COLORS.length];

    const row = document.createElement("div");
    row.className = "resultRow";
    row.innerHTML = `
      <div class="resultTop">
        <div class="rankBadge" style="background:${color};color:${color === '#161311' ? '#fff' : '#161311'}">${index + 1}</div>
        <div class="resultName">
          <b>${item.fullName || "Unnamed"}</b>
          <span>${item.contestantNumber || ""}</span>
        </div>
        <div class="resultStats">
          <b>${pct.toFixed(1)}%</b>
          <span>${money0(votes)} votes</span>
        </div>
      </div>
      <div class="barTrack">
        <div class="barFill" style="width:${pct}%;background:${color}"></div>
      </div>
    `;
    resultsList.appendChild(row);

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="rankCell">${index + 1}</td>
      <td class="nameCell">
        <b>${item.fullName || "Unnamed"}</b>
        <span>${item.contestantNumber || ""}</span>
      </td>
      <td class="num">${money0(votes)}</td>
      <td class="num">${pct.toFixed(1)}%</td>
    `;
    rankTableBody.appendChild(tr);
  });
}

async function init(){
  await loadEvents();
  await loadCategoriesForSelectedEvent();
  await loadResults();
}

init();
</script>

</body>
</html>
