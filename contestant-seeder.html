<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Contestant | Lumina Admin Tool</title>
<link rel="stylesheet" href="css/style.css">

<style>
.seedWrap{
  max-width:820px;
  margin:30px auto;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--stroke);
  border-radius:24px;
  padding:28px;
  box-shadow:0 12px 28px rgba(15,23,42,0.08);
}

.success{
  margin-top:14px;
  font-weight:800;
  color:#15803d;
}

.error{
  margin-top:14px;
  font-weight:800;
  color:#dc2626;
}

.infoBox{
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  background:#f8fbff;
  border:1px solid var(--stroke);
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}

.posterPreview{
  margin-top:10px;
  width:100%;
  max-height:300px;
  object-fit:cover;
  border-radius:16px;
  border:1px solid var(--stroke);
  display:none;
  background:#eef4ff;
}

.categoryBox{
  display:none;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.uploadBox{
  margin-top:8px;
  padding:16px;
  border:1px dashed var(--stroke);
  border-radius:16px;
  background:#fbfdff;
}

.uploadStatus{
  margin-top:10px;
  font-size:13px;
  font-weight:800;
}

.loginPrompt{
  padding:20px;
  border:1px dashed var(--stroke);
  border-radius:18px;
  background:#fbfdff;
  text-align:center;
}

@media(max-width:700px){
  .row{
    grid-template-columns:1fr;
  }

  .card{
    padding:20px;
  }
}
</style>
</head>

<body>

<header class="nav">
  <div class="brand">Lumina <span>Admin Tool</span></div>

  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <a class="btn small ghost" href="organizer-dashboard.html">Dashboard</a>
    <a class="btn small" href="voting-home.html">Voting Home</a>
  </div>
</header>

<main class="container seedWrap">

<div id="loadingBox" class="infoBox">Checking login...</div>

<div id="loginPrompt" class="loginPrompt" style="display:none;">
  <h2>Login Required</h2>
  <p class="muted">You must login before adding contestants.</p>
  <a class="btn" href="organizer-login.html">Go to Login</a>
</div>

<div class="card" id="mainCard" style="display:none;">

<h1>Add Contestant</h1>
<p class="muted">Add contestants to your voting event.</p>

<form class="form" onsubmit="return false;">

  <label>Select Event</label>
  <select id="eventSelect">
    <option value="">Loading your events...</option>
  </select>

  <div id="eventInfo" class="infoBox" style="display:none;"></div>

  <div id="categoryBox" class="categoryBox">
    <label>Select Category</label>
    <select id="categorySelect">
      <option value="">Select category</option>
    </select>
  </div>

  <label>Full Name</label>
  <input type="text" id="fullName" placeholder="Contestant full name">

  <div class="row">
    <div>
      <label>Contestant Number</label>
      <input type="text" id="contestantNumber" placeholder="e.g. 1">
    </div>

    <div>
      <label>Starting Votes</label>
      <input type="number" id="votes" value="0" min="0">
    </div>
  </div>

  <label>Contestant Photo</label>
  <div class="uploadBox">
    <input type="file" id="photoFile" accept="image/*">
    <div id="uploadStatus" class="uploadStatus"></div>
    <img id="photoPreview" class="posterPreview" alt="Contestant preview">
  </div>

  <label>Status</label>
  <select id="status">
    <option value="active">Active</option>
    <option value="eliminated">Eliminated</option>
  </select>

  <button class="btn" id="addBtn" style="margin-top:16px;width:100%;">
    Add Contestant
  </button>

  <div id="msg"></div>

</form>

</div>

<div class="footer">
© <span id="y"></span> Lumina Creative Co<br>
Site created by <b>Lord Wilhelm</b> (0593410452)
</div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxry90zexnjiHIjVv_QluPlPWcqfxWb6Q",
  authDomain: "sma-model-scout.firebaseapp.com",
  projectId: "sma-model-scout",
  storageBucket: "sma-model-scout.firebasestorage.app",
  messagingSenderId: "786081868543",
  appId: "1:786081868543:web:5805a21ac5dab4c799faca",
  measurementId: "G-10LWV01GZE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const CLOUDINARY_CLOUD_NAME = "dprk7qttr";
const CLOUDINARY_UPLOAD_PRESET = "lumina_events";

const ADMINS = new Set([
  "mensahpaa00@gmail.com",
  "techhubgraph@gmail.com"
]);

document.getElementById("y").textContent = new Date().getFullYear();

const loadingBox = document.getElementById("loadingBox");
const loginPrompt = document.getElementById("loginPrompt");
const mainCard = document.getElementById("mainCard");

const eventSelect = document.getElementById("eventSelect");
const categoryBox = document.getElementById("categoryBox");
const categorySelect = document.getElementById("categorySelect");
const eventInfo = document.getElementById("eventInfo");

const fullNameInput = document.getElementById("fullName");
const contestantNumberInput = document.getElementById("contestantNumber");
const votesInput = document.getElementById("votes");
const statusInput = document.getElementById("status");

const photoFileInput = document.getElementById("photoFile");
const photoPreview = document.getElementById("photoPreview");
const uploadStatus = document.getElementById("uploadStatus");

const addBtn = document.getElementById("addBtn");
const msg = document.getElementById("msg");

let currentUser = null;
let isAdminUser = false;
let allEvents = [];
let currentCategories = [];
let currentContestants = [];
let uploadedPhotoUrl = "";
let isUploadingImage = false;

function showMsg(text, type){
  msg.innerHTML = `<div class="${type}">${text}</div>`;
}

function setUploadStatus(text, type="success"){
  uploadStatus.textContent = text;
  uploadStatus.className = "uploadStatus " + type;
  uploadStatus.style.color = type === "error" ? "#dc2626" : "#15803d";
}

function selectedEvent(){
  const eventId = eventSelect.value;
  return allEvents.find(e => e.id === eventId) || null;
}

function normalizeStatus(status){
  const s = (status || "").toLowerCase();
  if(s === "active" || s === "live") return "active";
  if(s === "upcoming") return "upcoming";
  if(s === "paused") return "paused";
  return "closed";
}

function previewSelectedImage(file){
  const reader = new FileReader();

  reader.onload = function(e){
    photoPreview.src = e.target.result;
    photoPreview.style.display = "block";
  };

  reader.readAsDataURL(file);
}

async function compressImage(file, maxWidth = 1600, quality = 0.8){
  const imageBitmap = await createImageBitmap(file);

  let width = imageBitmap.width;
  let height = imageBitmap.height;

  if(width > maxWidth){
    height = Math.round((height * maxWidth) / width);
    width = maxWidth;
  }

  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(imageBitmap, 0, 0, width, height);

  const blob = await new Promise((resolve) => {
    canvas.toBlob(resolve, "image/jpeg", quality);
  });

  if(!blob){
    throw new Error("Could not compress image.");
  }

  return new File([blob], "compressed-contestant-photo.jpg", {
    type: "image/jpeg"
  });
}

async function uploadImageToCloudinary(file){
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
  formData.append("folder", "lumina_contestants");

  const response = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
    {
      method: "POST",
      body: formData
    }
  );

  const data = await response.json();

  if(!response.ok || !data.secure_url){
    throw new Error(data.error?.message || "Image upload failed.");
  }

  return data.secure_url;
}

photoFileInput.addEventListener("change", async (event) => {
  const file = event.target.files[0];

  uploadedPhotoUrl = "";
  setUploadStatus("");
  photoPreview.style.display = "none";

  if(!file) return;

  previewSelectedImage(file);

  try{
    isUploadingImage = true;
    setUploadStatus("Uploading image...");

    const compressedFile = await compressImage(file);
    uploadedPhotoUrl = await uploadImageToCloudinary(compressedFile);

    setUploadStatus("Image uploaded successfully.");
  }catch(error){
    console.error("Image upload error:", error);
    uploadedPhotoUrl = "";
    setUploadStatus("Image upload failed.", "error");
  }finally{
    isUploadingImage = false;
  }
});

async function loadEvents(){
  try{
    eventSelect.innerHTML = `<option value="">Loading your events...</option>`;

    let snap;

    if(isAdminUser){
      snap = await getDocs(collection(db, "events"));
    }else{
      const q = query(
        collection(db, "events"),
        where("organizerId", "==", currentUser.uid)
      );
      snap = await getDocs(q);
    }

    allEvents = snap.docs.map(docu => ({
      id: docu.id,
      ...docu.data()
    }));

    allEvents.sort((a, b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")));

    eventSelect.innerHTML = `<option value="">Select event</option>`;

    allEvents.forEach(eventItem => {
      const opt = document.createElement("option");
      opt.value = eventItem.id;
      opt.textContent = `${eventItem.eventName || "Untitled Event"} (${eventItem.eventCode || "No Code"})`;
      eventSelect.appendChild(opt);
    });

    if(allEvents.length === 0){
      eventSelect.innerHTML = `<option value="">No events found for your account</option>`;
    }

  }catch(error){
    console.error(error);
    eventSelect.innerHTML = `<option value="">Could not load events</option>`;
    showMsg(error.message || "Could not load events.", "error");
  }
}

async function loadCategoriesForEvent(eventItem){
  currentCategories = [];
  categorySelect.innerHTML = `<option value="">Loading categories...</option>`;

  if(!eventItem || !eventItem.hasCategories){
    categoryBox.style.display = "none";
    categorySelect.innerHTML = `<option value="">No category</option>`;
    return;
  }

  categoryBox.style.display = "block";

  try{
    const q = query(
      collection(db, "eventCategories"),
      where("eventId", "==", eventItem.id)
    );

    const snap = await getDocs(q);

    currentCategories = snap.docs.map(docu => ({
      id: docu.id,
      ...docu.data()
    }));

    currentCategories.sort((a, b) => Number(a.categoryCode || 0) - Number(b.categoryCode || 0));

    categorySelect.innerHTML = `<option value="">Select category</option>`;

    currentCategories.forEach(cat => {
      const opt = document.createElement("option");
      opt.value = cat.id;
      opt.textContent = `${cat.categoryCode}. ${cat.categoryName}`;
      categorySelect.appendChild(opt);
    });

    if(currentCategories.length === 0){
      categorySelect.innerHTML = `<option value="">No categories found</option>`;
    }

  }catch(error){
    console.error(error);
    categorySelect.innerHTML = `<option value="">Could not load categories</option>`;
    showMsg(error.message || "Could not load categories.", "error");
  }
}

async function loadContestantsForEvent(eventItem){
  currentContestants = [];

  if(!eventItem) return;

  try{
    const q = query(
      collection(db, "eventContestants"),
      where("eventId", "==", eventItem.id)
    );

    const snap = await getDocs(q);

    currentContestants = snap.docs.map(docu => ({
      id: docu.id,
      ...docu.data()
    }));

    const maxNumber = currentContestants.reduce((max, c) => {
      const n = parseInt(c.contestantNumber || "0", 10);
      return isNaN(n) ? max : Math.max(max, n);
    }, 0);

    contestantNumberInput.value = String(maxNumber + 1);

  }catch(error){
    console.error("Could not load contestants:", error);
  }
}

function renderEventInfo(eventItem){
  if(!eventItem){
    eventInfo.style.display = "none";
    return;
  }

  eventInfo.style.display = "block";
  eventInfo.innerHTML = `
    <b>${eventItem.eventName || "Untitled Event"}</b><br>
    Event Code: <b>${eventItem.eventCode || "—"}</b><br>
    Organizer: <b>${eventItem.organizerName || "—"}</b><br>
    Status: <b>${normalizeStatus(eventItem.status)}</b><br>
    Categories: <b>${eventItem.hasCategories ? "Yes" : "No"}</b><br>
    Vote Price: <b>GHS ${Number(eventItem.votePrice || 0).toFixed(2)}</b>
  `;
}

eventSelect.addEventListener("change", async () => {
  msg.innerHTML = "";
  const eventItem = selectedEvent();

  renderEventInfo(eventItem);
  await loadCategoriesForEvent(eventItem);
  await loadContestantsForEvent(eventItem);
});

addBtn.addEventListener("click", async () => {
  msg.innerHTML = "";

  const eventItem = selectedEvent();

  if(!eventItem){
    showMsg("Select an event.", "error");
    return;
  }

  const fullName = fullNameInput.value.trim();
  const contestantNumber = contestantNumberInput.value.trim();
  const votes = parseInt(votesInput.value || "0", 10);
  const status = statusInput.value;

  let categoryData = null;

  if(eventItem.hasCategories){
    const categoryId = categorySelect.value;

    if(!categoryId){
      showMsg("Select a category for this contestant.", "error");
      return;
    }

    categoryData = currentCategories.find(c => c.id === categoryId) || null;

    if(!categoryData){
      showMsg("Selected category was not found.", "error");
      return;
    }
  }

  if(!fullName){
    showMsg("Enter contestant full name.", "error");
    return;
  }

  if(!contestantNumber){
    showMsg("Enter contestant number.", "error");
    return;
  }

  if(isNaN(votes) || votes < 0){
    showMsg("Starting votes must be 0 or more.", "error");
    return;
  }

  if(isUploadingImage){
    showMsg("Wait for image upload to finish.", "error");
    return;
  }

  if(!uploadedPhotoUrl){
    showMsg("Upload contestant photo.", "error");
    return;
  }

  const duplicate = currentContestants.some(c => {
    const sameNumber = String(c.contestantNumber || "").trim() === contestantNumber;

    if(!sameNumber) return false;

    if(eventItem.hasCategories){
      return String(c.categoryId || "") === String(categoryData?.id || "");
    }

    return true;
  });

  if(duplicate){
    showMsg("This contestant number already exists for this event/category.", "error");
    return;
  }

  try{
    addBtn.disabled = true;
    addBtn.textContent = "Adding...";

    await addDoc(collection(db, "eventContestants"), {
      fullName,
      contestantNumber,

      eventId: eventItem.id,
      eventCode: eventItem.eventCode || "",
      eventName: eventItem.eventName || "",

      organizerId: eventItem.organizerId || "",
      organizerName: eventItem.organizerName || "",

      hasCategory: !!eventItem.hasCategories,
      categoryId: categoryData ? categoryData.id : "",
      categoryCode: categoryData ? String(categoryData.categoryCode || "") : "",
      categoryName: categoryData ? categoryData.categoryName || "" : "",

      photoUrl: uploadedPhotoUrl,
      votes,
      status,
      createdAt: new Date().toISOString()
    });

    showMsg("Contestant added successfully.", "success");

    fullNameInput.value = "";
    uploadedPhotoUrl = "";
    photoFileInput.value = "";
    photoPreview.style.display = "none";
    setUploadStatus("");
    votesInput.value = "0";
    statusInput.value = "active";

    await loadContestantsForEvent(eventItem);

  }catch(error){
    console.error(error);
    showMsg(error.message || "Error adding contestant.", "error");
  }finally{
    addBtn.disabled = false;
    addBtn.textContent = "Add Contestant";
  }
});

onAuthStateChanged(auth, async (user) => {
  if(!user){
    loadingBox.style.display = "none";
    loginPrompt.style.display = "block";
    return;
  }

  currentUser = user;
  isAdminUser = ADMINS.has((user.email || "").toLowerCase());

  loadingBox.style.display = "none";
  mainCard.style.display = "block";

  await loadEvents();
});

</script>

</body>
</html>
